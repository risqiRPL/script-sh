# ============================================================
#  KONFIGURASI VPS MONITOR
#  Edit file ini sesuai kebutuhan. Jangan ubah vps_monitor.sh
# ============================================================

# ─── Telegram Bot ───────────────────────────────────────────
TELEGRAM_BOT_TOKEN="1234567890:ABCDEfghIJKLmnoPQRSTuvwxYZ"
TELEGRAM_CHAT_ID="-100123456789"

# Nama server ini (ditampilkan di notif Telegram)
SERVER_NAME="VPS-Fezora"

# ─── Endpoint / URL yang dipantau ───────────────────────────
# Format: "Nama Tampilan|https://url"
ENDPOINTS=(
  "Website Utama|https://fezora.net"
  "Supabase DB2|https://db2.supabase.fezora.net"
  "WhatsApp API|https://wa.fezora.net"
  "n8n Automation|https://n8n.fezora.net"
)

# ─── Service yang dipantau (systemd) ────────────────────────
# Format: "Nama Tampilan|nama_service"
SERVICES=(
  "Nginx|nginx"
  "MySQL|mysql"
  "Docker|docker"
  "Redis|redis-server"
  "PHP-FPM|php8.2-fpm"
)

# ─── Domain untuk cek SSL Expiry ────────────────────────────
SSL_DOMAINS=(
  "fezora.net"
  "db2.supabase.fezora.net"
  "wa.fezora.net"
  "n8n.fezora.net"
)

# ─── Threshold Alert ────────────────────────────────────────
# CPU usage dalam persen (0-100)
CPU_THRESHOLD=80

# RAM usage dalam persen (0-100)
RAM_THRESHOLD=85

# Disk usage dalam persen (0-100)
DISK_THRESHOLD=85

# Hari sebelum SSL expire → kirim warning
SSL_WARN_DAYS=14

# Response time (millisecond) dianggap lambat → kirim warning
RESPONSE_WARN_MS=3000

# ─── Jadwal Kirim Report (via cron) ─────────────────────────
# Script ini dijalankan via cron, bukan konfig di sini.
# Lihat setup_monitor.sh untuk contoh cron job.

# ─── Log ────────────────────────────────────────────────────
LOG_FILE="/var/log/vps_monitor.log"
LOG_MAX_SIZE_MB=10  # Auto rotate jika log > 10MB
